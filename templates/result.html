<!DOCTYPE html>
<html>
<head>
    <title>Confirmation</title>
    <style>
body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #ffffff;
}

/* Conteneur principal */
.container {
    max-width: 800px;
    margin: auto;
}

/* Titres */
h1, h2, h3 {
    color: #00d4ff;
}

/* Cartes */
.card {
    background-color: #1e1e1e;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

/* Centrage graphique */
.chart-box {
    width: 250px;
    height: 250px;
    margin: auto;
}

/* Responsive mobile */
@media (max-width: 600px) {
    body {
        padding: 10px;
    }

    .chart-box {
        width: 200px;
        height: 200px;
    }

    h1 {
        font-size: 20px;
    }
}
</style>
</head>
<body>
<div class="container">

<h1>Vos resultats soumis:</h1>

<div class="card">
    <p>Nom : {{ nom }}</p>
    <p>Âge : {{ age }}</p>
    <p>Filière : {{ filiere }}</p>
    <p>Niveau : {{ niveau }}</p>
</div>

<div class="card">
    <h2>📊 Statistiques globales </h2>
    <p>Âge moyen : {{ age_moyen | round(2) }}</p>
</div>

<div class="card">
    <h2>Diagramme Camembert: Effectif par filiere</h2>

    <div class="chart-box">
        <canvas id="pieChart" width="250" height="250"></canvas>
    </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const labels = {{ labels | tojson }};
const values = {{ values | tojson }};

new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: labels,
        datasets: [{
            data: values
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>
<div style="text-align: center; margin-top: 20px;">
    <a href="/" style="
        display: inline-block;
        padding: 10px 20px;
        background-color: #00d4ff;
        color: black;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
    ">
        ⬅ Retour au formulaire
    </a>
</div>
</body>
</html>
